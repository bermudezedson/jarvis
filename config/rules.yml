timezone: "America/Santiago"

briefing:
  morning_cron: "0 7 * * 1-5"      # Lunes a viernes 7:00 AM
  evening_cron: "0 18 * * 1-5"     # Lunes a viernes 6:00 PM
  refresh_interval_minutes: 5

team:
  # Dominios del equipo — Jarvis los trata como "nosotros" (no solo el CEO)
  domains:
    - "clickrepuestos.cl"
    - "webyseo.cl"
  # Emails específicos del CEO (para distinguir CEO respondió vs equipo respondió)
  ceo_emails:
    - "alejandro@webyseo.cl"
    - "alejandro@clickrepuestos.cl"
    - "hablemos@clickrepuestos.cl"

mail:
  safe_mode: true

  # Patrones en el subject que indican que el correo NO requiere acción del CEO
  # aunque involucre un cliente. Se marcan como estado "informativo".
  no_action_patterns:
    - "Factura N°"
    - "Factura N "
    - "Factura de servicios"
    - "Envío de Factura"
    - "Certificado SSL"
    - "Duplicator"
    - "Weekly Duplicator"

    - "cPanel Backup"
    - "cPanel Statistics"
    - "cPanel Cronjob"
    - "Renovación de Hosting"
    - "Pago recibido"
    - "Confirmación de pago"

  # Patrones de asunto o remitente que se excluyen ANTES de clasificar.
  # Ideal para correos internos de ERP, notificaciones de sistema, etc.
  # que no necesitas ver en Jarvis y solo generan ruido.
  exclude_patterns:
    - "nota de Venta Normal N"
    - "nota de Crédito Electrónica N"
    - "nota de Débito N"
    - "Factura Electrónica N"
    - "Cliente - Api"
    - "Asiento Contable"
    - "Cierre de Caja"
    - "Boleta Electrónica N"
    - "Liquidación de Sueldo"

  spam_domains:
    - "wordpress.com"
    - "wordpress.org"
    - "wp-notifications.com"
    - "mailchimp.com"
    - "sendgrid.net"
    - "fidelizador.org"
    - "hubspotemail.net"
    - "intercom-mail.com"
    - "mailjet.com"
    - "splashthat.com"
    - "emailsp.net"
    - "musvc.com"
    - "growclub.io"
    - "enex.cl"
    - "megago.cl"
    - "cinemark.cl"
  subscription_signals:
    - "unsubscribe"
    - "darse de baja"
    - "cancelar suscripcion"
    - "no-reply"
    - "noreply"
    - "notificacion automatica"
    - "este es un mensaje automatico"
    - "list-unsubscribe"
  priority_keywords:
    - "urgente"
    - "urgente!"
    - "pago pendiente"
    - "factura vencida"
    - "caída"
    - "caido"
    - "error crítico"
    - "reclamo"
    - "nota de crédito"
    - "no funciona"
    - "problema"
    - "bloqueado"
    - "suspendido"
    - "vencido"
    - "mora"
    - "plazo"
    - "hoy sin falta"
  client_request_keywords:
    - "necesito"
    - "solicito"
    - "podrían"
    - "pueden"
    - "cotización"
    - "presupuesto"
    - "consulta"
    - "cuándo"
    - "cuando"
    - "ayuda"
    - "revisar"
    - "actualizar"
    - "cambiar"
  max_executive_inbox_items: 7

jira:
  default_project: "CR"
  issue_types:
    client_request: "Task"
    bug_report: "Bug"
    feature: "Story"
  stale_days: 5

clients:
  stale_contact_days: 14
  health_weights:
    last_email: 0.3
    last_meeting: 0.3
    open_tickets: 0.2
    response_time: 0.2

client_scan:
  incremental_cron: "0 */4 * * *"      # Cada 4 horas (llama a Gmail)
  refresh_states_cron: "*/30 * * * *"  # Cada 30 min (recalcula sin costo)
  initial_days: 30                      # Ventana del escaneo inicial
  universal_cron: "0 * * * *"          # Universal scan: cada hora en punto

# Blacklist consolidada — alias de los campos dispersos en mail.*
# Al cargar rules.yml, código mergea discard_domains con spam_domains, etc.
blacklist:
  # Dominios que se descartan SIEMPRE — alias de mail.spam_domains
  discard_domains: []   # se puebla dinámicamente por "Silenciar dominio"

  # Patrones de asunto que se descartan — alias de mail.exclude_patterns
  discard_subjects: []  # se puebla dinámicamente por "Silenciar patrón"

state_machine:
  informativo_auto_archive_days: 7
  waiting_escalation_days: 14
  invoice_rules:
    hide_until_client_responds: true
    days_without_response_to_pending: 15
    auto_resolve_keywords:
      - "acuso recibo"
      - "acuse recibo"
      - "pago programado"
      - "pago realizado"
      - "transferencia realizada"
      - "transferencia enviada"
      - "ya fue pagado"
      - "deposito realizado"
      - "depósito realizado"
      - "adjunto pago"
      - "adjunto comprobante"
      - "pago respectivo"
      - "comprobante de pago"
      - "pago adjunto"

commitments:
  trigger_phrases:
    - "te lo envío"
    - "lo revisamos"
    - "me encargo"
    - "quedamos en"
    - "te confirmo"
    - "lo tengo listo"
    - "te respondo"
  default_deadline_days: 3
