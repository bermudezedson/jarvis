timezone: "America/Santiago"

briefing:
  morning_cron: "0 7 * * 1-5"      # Lunes a viernes 7:00 AM
  evening_cron: "0 18 * * 1-5"     # Lunes a viernes 6:00 PM
  refresh_interval_minutes: 5

mail:
  safe_mode: true

  # Patrones de asunto o remitente que se excluyen ANTES de clasificar.
  # Ideal para correos internos de ERP, notificaciones de sistema, etc.
  # que no necesitas ver en Jarvis y solo generan ruido.
  exclude_patterns:
    - "nota de Venta Normal N"
    - "nota de Crédito Electrónica N"
    - "nota de Débito N"
    - "Factura Electrónica N"
    - "Cliente - Api"
    - "Asiento Contable"
    - "Cierre de Caja"
    - "Boleta Electrónica N"
    - "Liquidación de Sueldo"

  spam_domains:
    - "wordpress.com"
    - "wordpress.org"
    - "wp-notifications.com"
    - "mailchimp.com"
    - "sendgrid.net"
    - "fidelizador.org"
    - "hubspotemail.net"
    - "intercom-mail.com"
    - "mailjet.com"
    - "splashthat.com"
    - "emailsp.net"
    - "musvc.com"
    - "growclub.io"
    - "enex.cl"
    - "megago.cl"
    - "cinemark.cl"
  subscription_signals:
    - "unsubscribe"
    - "darse de baja"
    - "cancelar suscripcion"
    - "no-reply"
    - "noreply"
    - "notificacion automatica"
    - "este es un mensaje automatico"
    - "list-unsubscribe"
  priority_keywords:
    - "urgente"
    - "urgente!"
    - "pago pendiente"
    - "factura vencida"
    - "caída"
    - "caido"
    - "error crítico"
    - "reclamo"
    - "nota de crédito"
    - "no funciona"
    - "problema"
  client_request_keywords:
    - "necesito"
    - "solicito"
    - "podrían"
    - "pueden"
    - "cotización"
    - "presupuesto"
    - "consulta"
    - "cuándo"
    - "cuando"
    - "ayuda"
    - "revisar"
    - "actualizar"
    - "cambiar"
  max_executive_inbox_items: 7

jira:
  default_project: "CR"
  issue_types:
    client_request: "Task"
    bug_report: "Bug"
    feature: "Story"
  stale_days: 5

clients:
  stale_contact_days: 14
  health_weights:
    last_email: 0.3
    last_meeting: 0.3
    open_tickets: 0.2
    response_time: 0.2

commitments:
  trigger_phrases:
    - "te lo envío"
    - "lo revisamos"
    - "me encargo"
    - "quedamos en"
    - "te confirmo"
    - "lo tengo listo"
    - "te respondo"
  default_deadline_days: 3
